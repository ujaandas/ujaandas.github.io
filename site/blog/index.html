<!DOCTYPE html>
<html lang="en">

<head>
  <title>Blog | Ujaan Das</title>
  {{ template "header.html" . }}
</head>

<body
  class="flex flex-col items-center justify-center align-middle min-h-screen bg-white dark:bg-slate-950 text-gray-800 dark:text-gray-100 font-serif">
  <main class="flex flex-col md:flex-row md:items-start justify-between max-w-3xl mx-auto flex-grow p-6 gap-6">
    {{ template "sidebar.html" . }}

    <div class="md:mt-10 flex-grow">
      <h1 class="text-3xl font-bold mb-6">Random Thoughts & Notes.</h1>

      {{ range .Tags.Posts }}
      <article class="mb-6">
        <h2 class="text-2xl font-semibold text-blue-700 dark:text-blue-400 hover:underline">
          <a href={{ .Filepath }}>{{ .Frontmatter.Title }}</a>
        </h2>
        <p class="text-base text-gray-500 dark:text-gray-400 mb-2">{{ .Frontmatter.Date }}</p>
        <p class="text-lg text-gray-700 dark:text-gray-300">{{ .Snippet }}</p>
      </article>
      {{ end }}
    </div>
  </main>

  {{ template "footer.html" . }}
</body>

</html>
