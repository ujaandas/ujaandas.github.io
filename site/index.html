<!DOCTYPE html>
<html lang="en">

<head>
  <title>Home | Ujaan Das</title>
  {{ template "header.html" . }}
</head>

<body
  class="flex flex-col items-center justify-center align-middle min-h-screen text-gray-800 dark:text-gray-200 font-serif antialiased">
  <main class="flex flex-col md:flex-row md:items-start justify-between max-w-3xl mx-auto flex-grow p-6 gap-6">
    {{ template "sidebar.html" . }}

    <div class="md:mt-10">
      <a href="/posts/about-me/">
        <h1
          class="text-3xl md:text-4xl mb-7 text-blue-700 dark:text-blue-300 hover:underline underline-offset-4 decoration-2 font-bold tracking-tight transition-colors duration-200">
          Hey, I'm Ujaan.
        </h1>
      </a>
      {{ template "aboutme.html" . }}

      <section class="mb-6">
        <a href="/blog/"
          class="text-2xl text-blue-700 dark:text-blue-300 font-semibold mb-2 hover:underline underline-offset-4 decoration-2 transition-colors duration-200">Blog
          →</a>
        <p class="text-base text-gray-600 dark:text-gray-300 mb-2">Random thoughts and quick writeups on things I learn.
        </p>
      </section>

      <section>
        <a href="/projects/"
          class="text-2xl text-blue-700 dark:text-blue-300 font-semibold mb-2 hover:underline underline-offset-4 decoration-2 transition-colors duration-200">Projects
          →</a>
        <p class="text-base text-gray-600 dark:text-gray-300 mb-2">Recruiters and employers, this way please!</p>
      </section>

    </div>
  </main>

  {{ template "footer.html" . }}
</body>

</html>
