<!DOCTYPE html>
<html lang="en">

<head>
  <title>Home | Ujaan Das</title>
  {{ template "header.html" . }}
</head>

<body class="flex flex-col items-center justify-center align-middle min-h-screen text-gray-800 font-serif antialiased">
  <main class="flex flex-col md:flex-row md:items-start justify-between max-w-3xl mx-auto flex-grow p-6 gap-6">
    {{ template "sidebar.html" . }}

    <div class="md:mt-10">
      <a href="/posts/about-me/">
        <h1
          class="text-3xl md:text-4xl mb-7 text-blue-700 hover:underline underline-offset-4 decoration-2 font-bold tracking-tight transition-colors duration-200">
          Hey, I'm Ujaan.
        </h1>
      </a>

      {{ range filterPostsByNotField "tags" "not-post" (sortByDesc "date" .Global.Posts) }}
      <article class="mb-6">
        <h2
          class="text-2xl font-semibold text-blue-700 hover:underline underline-offset-4 decoration-2 transition-colors duration-200">
          <a href={{ .Filepath }}>{{ get .Frontmatter "title" }}</a>
        </h2>
        <p class="text-sm tracking-wide text-gray-500">{{ get .Frontmatter "date" }}</p>
        <p class="text-lg text-gray-700 leading-relaxed">{{ .Snippet }}</p>
      </article>
      {{ end }}

    </div>
  </main>

  {{ template "footer.html" . }}
</body>

</html>
