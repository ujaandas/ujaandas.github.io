<!DOCTYPE html>
<html lang="en">

<head>
  <title>Blog | Ujaan Das</title>
  {{ template "header.html" . }}
</head>

<body class="flex flex-col items-center justify-center align-middle min-h-screen bg-white text-gray-800 font-serif">
  <main class="flex flex-col md:flex-row md:items-start justify-between max-w-3xl mx-auto flex-grow p-6 gap-6">
    {{ template "sidebar.html" . }}

    <div class="md:mt-10 flex-grow">
      <h1 class="text-3xl font-bold mb-6">What I've Been Working On.</h1>

      {{ range .Tags.Projects }}
      <article class="mb-6">
        <div class="w-full h-48 overflow-hidden rounded-lg bg-gray-100 mb-4">
          <img 
            src={{ .Frontmatter.Thumbnail }}
            alt="Thumbnail for {{ .Frontmatter.Title }}" 
            class="w-full h-full object-cover object-[50%_60%]"
          />
        </div>
        <div>
          <h2 class="text-2xl font-semibold text-blue-700 hover:underline">
            <a href={{ .Filepath }}>{{ .Frontmatter.Title }}</a>
          </h2>
          <p class="text-base text-gray-500 mb-2">{{ .Frontmatter.Date }}</p>
          <p class="text-lg text-gray-700">{{ .Snippet }}</p>
        </div>
      </article>
      {{ end }}
    </div>
  </main>

  {{ template "footer.html" . }}
</body>

</html>
