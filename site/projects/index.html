<!DOCTYPE html>
<html lang="en">

<head>
  <title>Projects | Ujaan Das</title>
  {{ template "header.html" . }}
</head>

<body class="flex flex-col items-center justify-center align-middle min-h-screen text-gray-800 font-serif antialiased">
  <main class="flex flex-col md:flex-row md:items-start justify-between max-w-3xl mx-auto flex-grow p-6 gap-6">
    {{ template "sidebar.html" . }}

    <div class="md:mt-10 flex-grow">
      <h1 class="text-3xl md:text-4xl font-bold mb-7 tracking-tight">My Work!</h1>

      {{ range .Tags.Projects }}
      <article class="mb-10 group">
        <a href={{ .Filepath }} class="block mb-4">
          <div class="w-full h-52 overflow-hidden rounded-lg mb-4">
            <img src={{ .Frontmatter.Thumbnail }} alt="Thumbnail for {{ .Frontmatter.Title }}"
              class="w-full h-full object-cover object-[50%_60%] transition-transform duration-300 ease-out group-hover:scale-[1.03]" />
          </div>
        </a>
        <div class="space-y-2">
          <h2
            class="text-2xl font-semibold text-blue-700 hover:underline underline-offset-4 decoration-2 transition-colors duration-200">
            <a href={{ .Filepath }}>{{ .Frontmatter.Title }}</a>
          </h2>
          <p class="text-sm tracking-wide text-gray-500">{{ .Frontmatter.Date }}</p>
          <p class="text-lg text-gray-700 leading-relaxed">{{ .Snippet }}</p>
        </div>
      </article>
      {{ end }}
    </div>
  </main>

  {{ template "footer.html" . }}
</body>

</html>
