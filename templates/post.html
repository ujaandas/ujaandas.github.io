<!DOCTYPE html>
<html lang="en">

<head>
  <title>{{ get .Frontmatter "title" }} | Ujaan Das</title>
  {{ template "header.html" . }}
</head>

<body class={{ template "body_class.html" . }}>
  <main class={{ template "main_class.html" . }}>
    {{ template "sidebar.html" . }}

    <div class="md:mt-10 w-full overflow-hidden">
      <h1 class="text-3xl md:text-4xl font-bold tracking-tight mb-2">{{ get .Frontmatter "title" }}</h1>
      <div class="flex flex-row items-center gap-2 mt-1">
        <p class="text-sm tracking-wide text-gray-500">
          {{ get .Frontmatter "date" }}
        </p>

        {{ range get .Frontmatter "tags" }}
        <span
          class="text-xs text-gray-600 border border-gray-200 rounded-full px-2 py-0.5 hover:border-gray-400 transition-colors duration-200">
          #{{ . }}
        </span>
        {{ end }}
      </div>
      <!-- <p class="text-sm tracking-wide text-gray-500 mb-4">{{ get .Frontmatter "date" }}</p> -->
      <article class="article">
        {{ .Content }}
      </article>
    </div>
  </main>

  {{ template "footer.html" . }}
</body>

</html>
